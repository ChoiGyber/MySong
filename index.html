<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MySong</title>
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <div id="app">
      <!-- ===== Title bar (draggable) ===== -->
      <header class="titlebar" data-tauri-drag-region>
        <div class="title" data-tauri-drag-region>
          <span class="title-note">♪<span class="aug-dot">·</span></span>
          <span class="title-text">MySong</span>
        </div>
        <div class="title-actions">
          <button id="pinBtn" class="win-btn pin" title="항상 위에 고정">
            <svg viewBox="0 0 16 16" width="13.3" height="13.3" aria-hidden="true">
              <path fill="currentColor" d="M9.828.722a.5.5 0 0 1 .354.146l4.95 4.95a.5.5 0 0 1 0 .707c-.48.48-1.072.588-1.503.588-.177 0-.335-.018-.46-.039l-3.134 3.134a5.927 5.927 0 0 1 .16 1.013c.046.702-.032 1.687-.72 2.375a.5.5 0 0 1-.707 0l-2.829-2.828-3.182 3.182c-.195.195-1.219.902-1.414.707-.195-.195.512-1.22.707-1.414l3.182-3.182-2.828-2.829a.5.5 0 0 1 0-.707c.688-.688 1.673-.767 2.375-.72a5.922 5.922 0 0 1 1.013.16l3.134-3.133a2.772 2.772 0 0 1-.04-.461c0-.43.108-1.022.589-1.503a.5.5 0 0 1 .353-.146z"/>
            </svg>
          </button>
          <button id="settingsBtn" class="win-btn" title="설정">⚙</button>
          <button id="collapseBtn" class="win-btn" title="접기/펼치기">▾</button>
          <button id="minBtn" class="win-btn" title="최소화">–</button>
          <button id="closeBtn" class="win-btn close" title="닫기">✕</button>
        </div>
      </header>

      <section class="body">
        <!-- ===== Transport controls ===== -->
        <div class="controls">
          <button id="playBtn" class="ctrl primary" title="재생/일시정지"></button>
          <button id="stopBtn" class="ctrl" title="정지"></button>
          <button id="repeatBtn" class="ctrl" title="반복 모드"></button>
          <div class="volume">
            <button id="muteBtn" class="ctrl mute" title="음소거"></button>
            <input id="volume" class="range vol" type="range" min="0" max="1" step="0.01" value="0.8" />
          </div>
        </div>

        <!-- ===== Seek bar ===== -->
        <div class="seekrow">
          <span id="curTime" class="time">0:00</span>
          <input id="seek" class="range seek" type="range" min="0" max="1000" step="1" value="0" />
          <span id="totTime" class="time">0:00</span>
        </div>

        <!-- ===== Waveform ===== -->
        <canvas id="wave" class="wave"></canvas>

        <!-- ===== Now-playing marquee ===== -->
        <div class="nowplaying">
          <span id="npText" class="marquee">준비됨</span>
        </div>

        <!-- ===== Folder import + filter ===== -->
        <div class="sourcerow collapsible">
          <button id="folderBtn" class="chip" title="폴더 가져오기">+ 폴더</button>
          <div class="select-wrap">
            <select id="folderSelect" class="select" title="폴더 필터">
              <option value="">폴더 선택</option>
            </select>
          </div>
          <button id="folderClear" class="win-btn small" title="필터 해제">✕</button>
        </div>

        <!-- ===== YouTube URL ===== -->
        <div class="ytrow collapsible">
          <input id="ytInput" class="yt-input" type="text" placeholder="YouTube URL 붙여넣기" spellcheck="false" />
          <button id="ytAdd" class="add-btn" title="목록에 추가">+</button>
        </div>

        <!-- ===== Playlist ===== -->
        <ul id="playlist" class="playlist collapsible" tabindex="0"></ul>
      </section>

      <!-- ===== Bottom-right resize grip ===== -->
      <div id="resize" class="resize-grip" title="크기 조절"></div>

      <!-- ===== Toast ===== -->
      <div id="toast" class="toast hidden"></div>

      <!-- ===== Settings modal ===== -->
      <div id="settingsModal" class="modal hidden">
        <div class="modal-box">
          <h3 class="modal-title">설정</h3>
          <p class="modal-note">(API 키는 암호화되어 로컬에 저장됩니다.)</p>
          <label class="field">
            <span>GPT API 키</span>
            <input id="setGptKey" type="password" placeholder="sk-..." spellcheck="false" />
          </label>
          <label class="field">
            <span>Gemini API 키</span>
            <input id="setGeminiKey" type="password" placeholder="AIza..." spellcheck="false" />
          </label>
          <label class="field">
            <span>사용할 AI</span>
            <select id="setProvider">
              <option value="auto">자동 (키가 있는 쪽)</option>
              <option value="gpt">GPT</option>
              <option value="gemini">Gemini</option>
            </select>
          </label>
          <label class="field">
            <span>관련 음악 추가 개수 (0 = 사용 안 함)</span>
            <input id="setRelated" type="number" min="0" max="10" step="1" value="0" />
          </label>
          <p class="modal-note">API 키를 사용하면 위에서 설정한 개수만큼 관련 음악이 자동으로 재생 목록에 추가됩니다.</p>
          <div class="modal-actions">
            <button id="setSave" class="chip">저장</button>
            <button id="setCancel" class="chip ghost">취소</button>
          </div>
          <div class="modal-foot">
            <a id="ghLink" href="#" title="GitHub 저장소 열기">GitHub</a>
            <span id="appVersion" class="ver"></span>
            <span class="credit">by ChoiGyber</span>
            <button id="updateBtn" class="foot-btn">업데이트 확인</button>
          </div>
        </div>
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
